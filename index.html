<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OHPAH</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0B1929;
      min-height: 100dvh;
      font-family: system-ui, sans-serif;
      overflow: hidden;
    }

    /* ── Splash overlay ── */
    #splash {
      position: fixed;
      inset: 0;
      background: #0B1929;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.9s ease;
    }

    #splash.fade-out {
      opacity: 0;
      pointer-events: none;
    }

    /* Video: fills vertically on mobile, contained on desktop */
    #splash-video {
      height: 100dvh;
      width: auto;
      max-width: 100vw;
      object-fit: contain;
      display: block;
    }

    @media (min-width: 640px) {
      #splash-video {
        height: 100dvh;
        max-height: 100dvh;
      }
    }

    /* ── Loading dots ── */
    .dots {
      position: absolute;
      bottom: 36px;
      left: 0;
      right: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 8px;
    }

    .dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.45);
      animation: dot-pulse 1.4s ease-in-out infinite;
    }

    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes dot-pulse {
      0%, 100% { opacity: 0.25; transform: scale(0.75); }
      50%       { opacity: 1;    transform: scale(1);    }
    }

    /* ── App content (hidden until splash exits) ── */
    #app {
      opacity: 0;
      transition: opacity 0.6s ease 0.2s;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
    }

    #app.visible {
      opacity: 1;
    }
  </style>
</head>
<body>

  <!-- Splash screen -->
  <div id="splash">
    <video
      id="splash-video"
      src="assets/splash.mp4"
      autoplay
      muted
      loop
      playsinline
      preload="auto"
    ></video>
    <div class="dots">
      <span class="dot"></span>
      <span class="dot"></span>
      <span class="dot"></span>
    </div>
  </div>

  <!-- Main app shell (swap this out for your framework root) -->
  <div id="app">
    <p style="color: rgba(255,255,255,0.3); font-size: 14px; letter-spacing: 0.1em;">APP CONTENT</p>
  </div>

  <script>
    const splash = document.getElementById('splash');
    const app    = document.getElementById('app');
    const video  = document.getElementById('splash-video');

    // Minimum time the splash is shown (ms) — lets the animation breathe
    const MIN_DURATION = 3200;

    let minElapsed  = false;
    let appReady    = false;

    function tryDismiss() {
      if (!minElapsed || !appReady) return;
      splash.classList.add('fade-out');
      app.classList.add('visible');
      setTimeout(() => splash.remove(), 1000);
    }

    // Enforce minimum display time
    setTimeout(() => {
      minElapsed = true;
      tryDismiss();
    }, MIN_DURATION);

    // Signal app ready — replace / extend this with your real loading logic
    function onAppReady() {
      appReady = true;
      tryDismiss();
    }

    // Demo: treat the video's first full loop as the loading window
    // In production, call onAppReady() when your data/assets are loaded.
    video.addEventListener('timeupdate', function handler() {
      if (video.currentTime > 0 && video.duration && video.currentTime >= video.duration - 0.1) {
        video.removeEventListener('timeupdate', handler);
        onAppReady();
      }
    });

    // Fallback: if video never fires (autoplay blocked, etc.) still dismiss
    setTimeout(onAppReady, 6000);
  </script>

</body>
</html>
