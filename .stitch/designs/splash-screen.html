<style>
        body {
            background-color: #051424; /* surface-dim */
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Atmospheric Glows */
        .glow-layer {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            border-radius: 50%;
            filter: blur(80px);
            pointer-events: none;
            z-index: 1;
        }

        .glow-white-navy {
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(193, 198, 219, 0.08) 0%, rgba(11, 17, 32, 0) 70%);
        }

        .glow-crimson {
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(127, 29, 29, 0.12) 0%, rgba(11, 17, 32, 0) 70%);
        }

        /* Vignette for Military feel */
        .vignette {
            position: fixed;
            inset: 0;
            background: radial-gradient(circle, transparent 40%, rgba(0, 0, 0, 0.4) 100%);
            pointer-events: none;
            z-index: 5;
        }

        .branding-block {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        /* Subtle scanline effect for military aesthetic */
        .scanlines {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 2;
            background: linear-gradient(
                to bottom,
                rgba(255, 255, 255, 0) 50%,
                rgba(0, 0, 0, 0.02) 50%
            );
            background-size: 100% 4px;
        }

        .fade-in {
            animation: fadeInScale 1.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes fadeInScale {
            0% { opacity: 0; transform: scale(0.98); }
            100% { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
